---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">

<head>

{% include head.html %}
{% include head/custom.html %}

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/jsvectormap@1.3.3/dist/css/jsvectormap.min.css">


<style>

.visitor-container{

display:flex;
justify-content:center;
align-items:flex-start;
gap:50px;
flex-wrap:wrap;
margin-top:40px;

}


.travel-box,
.visitor-box{

text-align:center;

}


#travel-map{

width:500px;
height:300px;
}


.jvm-region{

fill:#d9e2ec;

}


.jvm-region.visited{

fill:#ff6b00 !important;

}


</style>


</head>


<body>


{% include browser-upgrade.html %}
{% include masthead.html %}


<div id="main" role="main">


{% include sidebar.html %}


<article class="page"
itemscope
itemtype="http://schema.org/CreativeWork">


{% if page.title %}

<meta itemprop="headline"
content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">

{% endif %}


<div class="page__inner-wrap">


<section class="page__content"
itemprop="text">


{{ content }}



<hr>



<div class="visitor-container">



<!-- 左侧旅行地图 -->

<div class="travel-box">


<h3>🌎 Countries I've Visited</h3>


<div id="travel-map"></div>


</div>




<!-- 右侧访客统计 -->


<div class="visitor-box">


<h3>🌍 Visitor Statistics</h3>


<iframe

src="https://revolvermaps2.com/widget/6154bee9-5867-4db3-93e4-3994b61d8fc2"

width="360"

height="360"

style="
border:0;
border-radius:12px;
"

loading="lazy">

</iframe>


</div>



</div>




</section>


</div>


</article>


</div>





<script src="https://cdn.jsdelivr.net/npm/jsvectormap"></script>

<script src="https://cdn.jsdelivr.net/npm/jsvectormap/dist/maps/world.js"></script>



<script>


const visitedCountries = [

"CN",
"JP",
"KR",
"SG",
"MY",
"TH",
"AE",
"GB",
"TR",
"BA",
"KH",
"TW",
"HK",
"MO"

];



const map = new jsVectorMap({

selector:"#travel-map",

map:"world",

zoomButtons:false,


backgroundColor:"#ffffff",


regionStyle:{

initial:{

fill:"#d9e2ec"

}

},


regionsSelectable:true,


onLoaded:function(){


visitedCountries.forEach(function(code){


let region =
document.querySelector(
'[data-code="'+code+'"]'
);


if(region){

region.classList.add("visited");

}


});


}


});



</script>



{% include scripts.html %}


</body>

</html>
