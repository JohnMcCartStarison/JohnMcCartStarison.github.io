---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
          
          <footer style="text-align:center; margin-top:40px;">

            <p><strong>Visitor Statistics</strong></p>
          
            <div style="display:flex; justify-content:center; align-items:center; gap:40px; flex-wrap:wrap; margin-top:20px;">
          
              <!-- 🌍 Globe -->
              <div style="width:260px;">
                <div id="clustrmaps-globe"></div>
          
                <script type="text/javascript"
                  id="clstr_globe"
                  src="https://clustrmaps.com/globe.js?d=vdOnDQAiOhWEfwaVChJ6_TSHdIkk5rK78Jd6KFi1Mw8">
                </script>
              </div>
          
             <!-- 📊 Counter（只显示数字） -->
                  <div style="width:120px; height:60px; overflow:hidden; margin:auto;">
                    <a href="https://clustrmaps.com/site/1c9qu" target="_blank">
                      <img 
                        src="https://www.clustrmaps.com/map_v2.png?d=vdOnDQAiOhWEfwaVChJ6_TSHdIkk5rK78Jd6KFi1Mw8&cl=ffffff"
                        style="transform: translateY(-70px);">
                    </a>
                  </div>
                  
                  <p style="margin-top:10px; font-size:14px; color:#666;">
                    Total Visits
                  </p>
              </div>
          
            </div>
          
          </footer>
        </div>
      </article>
    </div>

    {% include scripts.html %}

  </body>
</html>
