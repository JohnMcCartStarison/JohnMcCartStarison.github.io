---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">

<head>
  {% include head.html %}
  {% include head/custom.html %}
</head>

<body>

  {% include browser-upgrade.html %}
  {% include masthead.html %}

  <div id="main" role="main">

    {% include sidebar.html %}

    <article class="page" itemscope itemtype="http://schema.org/CreativeWork">

      {% if page.title %}
      <meta itemprop="headline"
            content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">
      {% endif %}

      <div class="page__inner-wrap">

        <section class="page__content" itemprop="text">

          {{ content }}

          <hr>

          <div class="revolvermaps-container">

            <h3>🌍 Visitor Statistics</h3>

            <!-- RevolverMaps 3D Visitor Globe -->
            <script 
              type="text/javascript"
              src="//rf.revolvermaps.com/0/0/8.js?i=YOUR_MAP_ID&m=0&c=ff0000&cr1=ffffff&f=arial&l=33"
              async="async">
            </script>

          </div>


        </section>

      </div>

    </article>

  </div>


  {% include scripts.html %}


<style>

.revolvermaps-container {
    text-align: center;
    margin-top: 40px;
}

.revolvermaps-container h3 {
    margin-bottom: 25px;
}

</style>


</body>

</html>
