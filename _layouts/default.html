---
layout: compress
---

<!doctype html>
<html lang="en" class="no-js">
  <head>
    {% include head.html %}
    {% include head/custom.html %}
  </head>

  <body>

    {% include browser-upgrade.html %}
    {% include masthead.html %}

    <div id="main" role="main">
      {% include sidebar.html %}
    
      <article class="page" itemscope itemtype="http://schema.org/CreativeWork">
        {% if page.title %}<meta itemprop="headline" content="{{ page.title | markdownify | strip_html | strip_newlines | escape_once }}">{% endif %}
        <div class="page__inner-wrap">
          <section class="page__content" itemprop="text">
            {{ content }}
          </section>
          
          <footer style="text-align:center; margin-top:40px;">

            <p><strong>Visitor Statistics</strong></p>
          
            <div style="display:flex; justify-content:center; align-items:center; gap:40px; flex-wrap:wrap; margin-top:20px;">
          
             <!-- 🌍 Globe -->
              <div style="width:320px; margin:auto;">
              
                  <div id="mmvst_globe"></div>
              
                  <script
                    type="text/javascript"
                    src="https://mapmyvisitors.com/globe.js?d=4-kxMWAkMq3oyZSOwMmvhSqODbneRrkNGtkSxVSxe9M">
                  </script>
              
              </div>

            </div>
         
          
          </footer>
        </div>
      </article>
    </div>

    {% include scripts.html %}

  </body>
</html>
