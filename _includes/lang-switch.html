<script>
(function() {
  // --- Determine current language from page URL ---
  var isZhPage = window.location.pathname.startsWith('/zh/') || 
                 window.location.pathname === '/zh';
  
  // --- Apply language class to HTML element ---
  if (isZhPage) {
    document.documentElement.lang = 'zh';
  } else {
    document.documentElement.lang = 'en';
  }

  // --- Update toggle button text ---
  function updateButton() {
    var btn = document.getElementById('lang-toggle');
    if (!btn) return;
    var isZh = document.documentElement.lang === 'zh';
    btn.innerHTML = isZh ? '🌐 English' : '🌐 中文';
    btn.title = isZh ? 'Switch to English' : '切换到中文';
  }

  // --- Toggle between EN and ZH pages ---
  window.toggleLanguage = function() {
    var isZh = document.documentElement.lang === 'zh';
    if (isZh) {
      // Switch to English (root page)
      window.location.href = '/';
    } else {
      // Switch to Chinese page
      window.location.href = '/zh/';
    }
  };

  // Initialize on page load
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', updateButton);
  } else {
    updateButton();
  }
})();
</script>
