<script>
(function() {
  var isZh = window.location.pathname.startsWith('/zh/') || 
             window.location.pathname === '/zh';
  document.documentElement.lang = isZh ? 'zh' : 'en';

  function translatePage() {
    if (!isZh) return;

    document.title = '冀承泽 - 首页';

    // --- Fix nav links: same-page + translate ---
    document.querySelectorAll('.greedy-nav a').forEach(function(a) {
      if (a.id === 'lang-toggle') return;
      a.target = '_self';
      var text = a.textContent.trim();
      var t = {
        'Homepage': '首页', 'About Me': '关于我', 'News': '新闻动态',
        'Publications': '论文&专利', 'Honors and Awards': '荣誉与获奖',
        'Research Experience and Projects': '科研&项目经历',
        'Educations': '教育背景',
      };
      if (t[text]) a.textContent = t[text];
    });

    // --- External links target ---
    document.querySelectorAll('a:not([href^="#"]):not([href^="/"]):not([href^="mailto"])').forEach(function(a) {
      a.target = '_blank';
    });

    // --- Sidebar name ---
    var nameEl = document.querySelector('.author__name');
    if (nameEl && nameEl.textContent.trim() === 'Chengze Ji') {
      nameEl.textContent = '冀承泽';
    }

    // --- Site description ---
    document.querySelectorAll('.author__urls-wrapper li div').forEach(function(div) {
      var t = div.textContent.trim();
      if (t.indexOf("School of Electrical") >= 0) {
        div.textContent = '西安交通大学电气工程学院';
      }
    });

    // --- Location (preserves whitespace via innerHTML) ---
    document.querySelectorAll('.author__urls-wrapper li').forEach(function(li) {
      var t = li.textContent;
      if (t.indexOf("Xi'an") >= 0 || t.indexOf("Xi\u2019an") >= 0) {
        li.innerHTML = li.innerHTML.replace(/Xi'?an(,\s*(China|中国))?/gi, '西安，中国');
      }
    });

    // --- Helper: replace text preserving original whitespace ---
    function replaceTextNode(parent, search, replace) {
      parent.childNodes.forEach(function(n) {
        if (n.nodeType === 3) {
          var idx = n.textContent.trim().indexOf(search);
          if (idx >= 0) {
            // Only replace the matched part, preserve surrounding whitespace
            var full = n.textContent;
            var start = full.indexOf(n.textContent.trim().substring(idx, idx + search.length));
            if (start >= 0) {
              n.textContent = full.substring(0, start) + replace + 
                             full.substring(start + search.length + (full.length - full.trim().length));
            }
          }
        }
      });
    }

    // --- Email (preserve leading space!) ---
    document.querySelectorAll('.author__urls-wrapper a[href^="mailto:"]').forEach(function(a) {
      a.childNodes.forEach(function(n) {
        if (n.nodeType === 3) {
          var trimmed = n.textContent.trim();
          if (trimmed === 'Email') {
            n.textContent = n.textContent.replace('Email', '邮件联系');
          }
        }
      });
    });

    // --- Google Scholar (preserve leading space!) ---
    document.querySelectorAll('.author__urls-wrapper a[href*="scholar.google"]').forEach(function(a) {
      a.childNodes.forEach(function(n) {
        if (n.nodeType === 3) {
          var trimmed = n.textContent.trim();
          if (trimmed === 'Google Scholar') {
            n.textContent = n.textContent.replace('Google Scholar', '谷歌学术主页');
          }
        }
      });
    });

    // --- Scopus (preserve leading space!) ---
    document.querySelectorAll('.author__urls-wrapper a[href*="scopus"]').forEach(function(a) {
      a.childNodes.forEach(function(n) {
        if (n.nodeType === 3) {
          var trimmed = n.textContent.trim();
          if (trimmed === 'Scopus') {
            n.textContent = n.textContent.replace('Scopus', 'Scopus个人主页');
          }
        }
      });
    });

    // --- Follow button ---
    var f = document.querySelector('.author__urls-wrapper .btn--inverse');
    if (f && f.textContent.trim() === 'Follow') f.textContent = '关注';

    // --- Toggle button ---
    var btn = document.getElementById('lang-toggle');
    if (btn) {
      btn.innerHTML = '🌐 English';
      btn.title = 'Switch to English';
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', translatePage);
  } else {
    translatePage();
  }

  window.toggleLanguage = function() {
    window.location.href = (document.documentElement.lang === 'zh') ? '/' : '/zh/';
  };
})();
</script>

.author__urls-wrapper li a img {
  width: 1.25em !important;

  object-fit: contain;
